<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Oyunları Merkezi</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome İkonları (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React ve ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Tarayıcıda JSX'i derlemek için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Three.js (Gerçek 3D Grafikler İçin) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* Tailwind'in saf CDN versiyonunda bazen animasyonları özelleştirmemiz gerekebiliyor */
        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse { animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-bounce-slow { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- İKON KÖPRÜLERİ (Lucide yerine FontAwesome Kullanımı) ---
        const createIcon = (iconClass) => ({ size = 24, className = "", style = {} }) => (
            <i className={`${iconClass} ${className}`} style={{ fontSize: size, ...style }}></i>
        );

        const Clock = createIcon("fas fa-clock");
        const Search = createIcon("fas fa-search");
        const UserMinus = createIcon("fas fa-user-minus");
        const RotateCcw = createIcon("fas fa-undo");
        const Rocket = createIcon("fas fa-rocket");
        const Bomb = createIcon("fas fa-bomb");
        const Ghost = createIcon("fas fa-ghost");
        const Hammer = createIcon("fas fa-hammer");
        const Gem = createIcon("fas fa-gem");
        const HelpCircle = createIcon("fas fa-question-circle");
        const ArrowLeft = createIcon("fas fa-arrow-left");
        const Star = createIcon("fas fa-star");
        const Heart = createIcon("fas fa-heart");
        const CheckCircle = createIcon("fas fa-check-circle");
        const XCircle = createIcon("fas fa-times-circle");
        const Trophy = createIcon("fas fa-trophy");
        const Play = createIcon("fas fa-play");

        // --- YARDIMCI BİLEŞENLER ---

        const AnalogClock = ({ hour, minute, size = 120, className = "" }) => {
            const hRot = (hour % 12) * 30 + (minute / 60) * 30;
            const mRot = minute * 6;
            return (
                <svg width={size} height={size} viewBox="0 0 100 100" className={`rounded-full bg-white border-4 border-slate-800 shadow-md ${className}`}>
                <circle cx="50" cy="50" r="46" fill="#f8fafc" />
                {[...Array(12)].map((_, i) => (
                    <React.Fragment key={i}>
                    <line x1="50" y1="4" x2="50" y2={i % 3 === 0 ? "12" : "8"} transform={`rotate(${i * 30} 50 50)`} stroke="#1e293b" strokeWidth={i % 3 === 0 ? 3 : 1.5} />
                    {i % 3 === 0 && i !== 0 && (
                        <text x="50" y="22" transform={`rotate(${i * 30} 50 50) rotate(${-i * 30} 50 18)`} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#334155" style={{transformOrigin: '50px 18px'}}>
                        {i === 0 ? 12 : i}
                        </text>
                    )}
                    {i === 0 && <text x="50" y="22" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#334155">12</text>}
                    </React.Fragment>
                ))}
                <line x1="50" y1="50" x2="50" y2="28" transform={`rotate(${hRot} 50 50)`} stroke="#1e293b" strokeWidth="4" strokeLinecap="round" />
                <line x1="50" y1="50" x2="50" y2="15" transform={`rotate(${mRot} 50 50)`} stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" />
                <circle cx="50" cy="50" r="3" fill="#1e293b" />
                </svg>
            );
        };

        const GameHeader = ({ title, onBack, icon: Icon }) => (
            <div className="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm mb-6 border-b-4 border-indigo-500">
                <div className="flex items-center gap-3">
                <div className="p-3 bg-indigo-100 rounded-lg text-indigo-600 flex items-center justify-center"><Icon size={20} /></div>
                <h2 className="text-2xl font-bold text-slate-800">{title}</h2>
                </div>
                <button onClick={onBack} className="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-semibold transition-colors">
                <ArrowLeft size={16} /> Menüye Dön
                </button>
            </div>
        );

        const FeedbackModal = ({ isSuccess, message, onNext, isGameOver = false }) => (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 transition-opacity duration-300">
                <div className="bg-white rounded-2xl p-8 max-w-sm w-full flex flex-col items-center text-center shadow-2xl transform transition-transform duration-300 scale-100">
                {isSuccess ? <CheckCircle size={64} className="text-green-500 mb-4" /> : <XCircle size={64} className="text-red-500 mb-4" />}
                <h3 className={`text-2xl font-bold mb-2 ${isSuccess ? 'text-green-600' : 'text-red-600'}`}>
                    {isSuccess ? 'Harika!' : 'Eyvah!'}
                </h3>
                <p className="text-lg text-slate-700 mb-6 font-medium">{message}</p>
                <button onClick={onNext} className={`px-8 py-3 rounded-xl font-bold text-white w-full transition-transform active:scale-95 ${isSuccess ? 'bg-green-500 hover:bg-green-600' : 'bg-blue-500 hover:bg-blue-600'}`}>
                    {isGameOver ? 'Oyunu Bitir' : 'Devam Et'}
                </button>
                </div>
            </div>
        );

        // --- 3D YARDIMCI FONKSİYONLAR ---
        
        // 100 Farklı Kız Karakter Kombinasyonu Üretici
        const getCharColors = (index) => {
            const skins = [0xffddc1, 0xd4a373, 0x8b5a2b, 0x3e2723]; // 4 Ten Rengi
            const hairs = [0x111111, 0x5c3a21, 0xe8c39e, 0x8b0000, 0x6a0dad]; // 5 Saç Rengi
            const dresses = [0xff0000, 0x0055ff, 0x22cc22, 0xff1493, 0xffd700]; // 5 Elbise Rengi
            // 4 * 5 * 5 = 100 kombinasyon
            return {
                skin: skins[index % 4],
                hair: hairs[Math.floor(index / 4) % 5],
                dress: dresses[Math.floor(index / 20) % 5]
            };
        };

        // 3D Kız Karakter (İnsan formunda, elbiseli, saçlı)
        const create3DCharacter = (index) => {
            const colors = getCharColors(index);
            const group = new THREE.Group();
            
            const skinMat = new THREE.MeshLambertMaterial({ color: colors.skin });
            const hairMat = new THREE.MeshLambertMaterial({ color: colors.hair });
            const dressMat = new THREE.MeshLambertMaterial({ color: colors.dress });

            // Kafa
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), skinMat);
            head.position.y = 2.8;
            head.castShadow = true;
            group.add(head);

            // Saç ve Topuz
            const hair = new THREE.Mesh(new THREE.SphereGeometry(0.65, 16, 16, 0, Math.PI * 2, 0, Math.PI / 1.5), hairMat);
            hair.position.y = 2.85;
            group.add(hair);
            const bun = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), hairMat);
            bun.position.set(0, 3.2, -0.4);
            group.add(bun);

            // Elbise / Gövde (Koniye benzer silindir)
            const dress = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.8, 1.5, 16), dressMat);
            dress.position.y = 1.5;
            dress.castShadow = true;
            group.add(dress);

            // Kollar
            const armGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 8);
            const leftArm = new THREE.Mesh(armGeo, skinMat);
            leftArm.position.set(-0.5, 1.6, 0);
            leftArm.rotation.z = Math.PI / 8;
            leftArm.castShadow = true;
            group.add(leftArm);
            
            const rightArm = new THREE.Mesh(armGeo, skinMat);
            rightArm.position.set(0.5, 1.6, 0);
            rightArm.rotation.z = -Math.PI / 8;
            rightArm.castShadow = true;
            group.add(rightArm);

            // Bacaklar
            const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 1, 8);
            const legMat = new THREE.MeshLambertMaterial({ color: 0x111111 }); // Siyah tayt/ayakkabı
            const leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.position.set(-0.25, 0.5, 0);
            leftLeg.castShadow = true;
            group.add(leftLeg);

            const rightLeg = new THREE.Mesh(legGeo, legMat);
            rightLeg.position.set(0.25, 0.5, 0);
            rightLeg.castShadow = true;
            group.add(rightLeg);

            return group;
        };

        // Özelleştirme Ekranı İçin 3D Önizleme Bileşeni
        const CharacterPreview3D = ({ charIndex }) => {
            const mountRef = React.useRef(null);
            
            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                camera.position.set(0, 3, 8);
                
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(250, 250);
                mountRef.current.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const light = new THREE.DirectionalLight(0xffffff, 0.8);
                light.position.set(5, 5, 5);
                scene.add(light);

                const char = create3DCharacter(charIndex);
                char.position.y = -1.5;
                scene.add(char);

                let reqId;
                const animate = () => {
                    reqId = requestAnimationFrame(animate);
                    char.rotation.y += 0.02; // Yavaşça dön
                    renderer.render(scene, camera);
                };
                animate();

                return () => {
                    cancelAnimationFrame(reqId);
                    mountRef.current?.removeChild(renderer.domElement);
                };
            }, [charIndex]);

            return <div ref={mountRef} className="w-[250px] h-[250px] mx-auto"></div>;
        };

        // 3D Oyun Motoru Sınıfı
        class DetectiveGame3D {
            constructor(container, mapId, charIndex, onClueHit) {
                this.container = container;
                this.onClueHit = onClueHit;
                this.paused = false;
                this.keys = { w: false, a: false, s: false, d: false };
                this.clues = [];

                // Sahne & Kamera
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(mapId === 'market' ? 0x0f172a : mapId === 'orman' ? 0x87CEEB : 0x1e293b);
                this.camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
                
                // Renderer
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                this.renderer.shadowMap.enabled = true;
                container.appendChild(this.renderer.domElement);

                // Işıklar
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(20, 40, 20);
                dirLight.castShadow = true;
                dirLight.shadow.camera.left = -30;
                dirLight.shadow.camera.right = 30;
                dirLight.shadow.camera.top = 30;
                dirLight.shadow.camera.bottom = -30;
                this.scene.add(dirLight);

                // Haritayı Kur
                this.buildMap(mapId);

                // Oyuncu Karakteri
                this.player = create3DCharacter(charIndex);
                this.player.position.set(0, 0, 0);
                this.scene.add(this.player);

                // İpuçlarını Dağıt
                this.spawnClues();

                // Kontroller
                this.handleKeyDown = (e) => this.keys[e.key.toLowerCase()] = true;
                this.handleKeyUp = (e) => this.keys[e.key.toLowerCase()] = false;
                window.addEventListener('keydown', this.handleKeyDown);
                window.addEventListener('keyup', this.handleKeyUp);

                // Döngü
                this.animate = this.animate.bind(this);
                this.reqId = requestAnimationFrame(this.animate);
            }

            buildMap(mapId) {
                // Zemin
                const groundGeo = new THREE.PlaneGeometry(100, 100);
                const colors = { orman: 0x2d4c1e, market: 0x1e293b, lahmacun: 0x9a3412, podyum: 0x701a75, muze: 0x292524 };
                const groundMat = new THREE.MeshLambertMaterial({ color: colors[mapId] });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                // Yol (Ortadan)
                const roadGeo = new THREE.PlaneGeometry(8, 100);
                const roadColors = { orman: 0x5c4033, market: 0x334155, lahmacun: 0xfde047, podyum: 0xfbcfe8, muze: 0xe5e5e5 };
                const roadMat = new THREE.MeshLambertMaterial({ color: roadColors[mapId] });
                const road = new THREE.Mesh(roadGeo, roadMat);
                road.rotation.x = -Math.PI / 2;
                road.position.y = 0.05;
                road.receiveShadow = true;
                this.scene.add(road);

                // Çevre Objeleri
                for(let i=0; i<60; i++) {
                    let x = (Math.random() - 0.5) * 80;
                    let z = (Math.random() - 0.5) * 80;
                    if (Math.abs(x) < 6) continue; // Yolu boş bırak

                    if (mapId === 'orman') {
                        // Gerçekçi Ağaçlar (Gövde + İğne Yaprak)
                        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 3), new THREE.MeshLambertMaterial({color: 0x4a3728}));
                        trunk.position.set(x, 1.5, z);
                        trunk.castShadow = true;
                        this.scene.add(trunk);
                        
                        const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5, 6, 8), new THREE.MeshLambertMaterial({color: 0x1b5e20}));
                        leaves.position.set(x, 5, z);
                        leaves.castShadow = true;
                        this.scene.add(leaves);
                        
                        // Arada bir baraka
                        if (i % 15 === 0) {
                            const house = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshLambertMaterial({color: 0x8b5a2b}));
                            house.position.set(x+2, 2, z+2);
                            house.castShadow = true;
                            this.scene.add(house);
                            const roof = new THREE.Mesh(new THREE.ConeGeometry(3.5, 2, 4), new THREE.MeshLambertMaterial({color: 0x3e2723}));
                            roof.position.set(x+2, 5, z+2);
                            roof.rotation.y = Math.PI/4;
                            this.scene.add(roof);
                        }
                    } else if (mapId === 'market') {
                        // Çadır / Stand
                        const stall = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshLambertMaterial({color: 0x94a3b8}));
                        stall.position.set(x, 1.5, z);
                        stall.castShadow = true;
                        this.scene.add(stall);
                        const awning = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 4), new THREE.MeshLambertMaterial({color: i%2===0 ? 0xef4444 : 0x3b82f6}));
                        awning.rotation.x = -Math.PI/3;
                        awning.position.set(x, 3.5, z+1);
                        this.scene.add(awning);
                    } else if (mapId === 'muze') {
                        // Sütunlar ve Eserler
                        const pillar = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1.5), new THREE.MeshLambertMaterial({color: 0xffffff}));
                        pillar.position.set(x, 1.5, z);
                        pillar.castShadow = true;
                        this.scene.add(pillar);
                        const art = new THREE.Mesh(new THREE.TorusKnotGeometry(0.5, 0.15, 64, 8), new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 1}));
                        art.position.set(x, 3.8, z);
                        this.scene.add(art);
                    }
                    // Lahmacun ve Podyum için basit objeler
                    else {
                        const obj = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({color: Math.random() * 0xffffff}));
                        obj.position.set(x, 1, z);
                        obj.castShadow = true;
                        this.scene.add(obj);
                    }
                }
            }

            spawnClues() {
                for(let i=0; i<10; i++) {
                    // Altın Büyüteç / Soru İşareti simülasyonu
                    const mesh = new THREE.Mesh(
                        new THREE.OctahedronGeometry(0.8),
                        new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xaa8800, metalness: 0.8 })
                    );
                    mesh.position.set((Math.random() - 0.5) * 40, 1, (Math.random() - 0.5) * 40);
                    mesh.castShadow = true;
                    this.scene.add(mesh);
                    this.clues.push({ id: i, mesh, solved: false });
                }
            }

            animate() {
                this.reqId = requestAnimationFrame(this.animate);
                if (this.paused) return;

                // Hareket
                const speed = 0.2;
                let dx = 0, dz = 0;
                
                // Mobil destekli dışarıdan gelen tuşları da oku
                if (this.keys.w || this.keys.arrowup) dz -= speed;
                if (this.keys.s || this.keys.arrowdown) dz += speed;
                if (this.keys.a || this.keys.arrowleft) dx -= speed;
                if (this.keys.d || this.keys.arrowright) dx += speed;

                this.player.position.x += dx;
                this.player.position.z += dz;

                // Yüzün Döneceği Yön
                if (dx !== 0 || dz !== 0) {
                    this.player.rotation.y = Math.atan2(dx, dz);
                }

                // Kamerayı İzlet (İzometrik / 3rd Person açı)
                this.camera.position.x = this.player.position.x;
                this.camera.position.z = this.player.position.z + 15;
                this.camera.position.y = 12;
                this.camera.lookAt(this.player.position);

                // İpucu Çarpışma Kontrolü & Efektler
                this.clues.forEach(clue => {
                    if (!clue.solved) {
                        clue.mesh.rotation.y += 0.05;
                        clue.mesh.position.y = 1 + Math.sin(Date.now() * 0.005) * 0.3; // Zıplama efekti
                        
                        // Mesafe kontrolü
                        if (this.player.position.distanceTo(clue.mesh.position) < 2) {
                            this.onClueHit(clue.id);
                        }
                    }
                });

                this.renderer.render(this.scene, this.camera);
            }

            setPaused(p) { this.paused = p; }
            
            resetPlayer() { 
                this.player.position.set(0, 0, 0); 
                this.camera.position.set(0, 12, 15);
            }
            
            markSolved(id) {
                const clue = this.clues.find(c => c.id === id);
                if(clue) {
                    clue.solved = true;
                    this.scene.remove(clue.mesh);
                }
            }

            cleanup() {
                window.removeEventListener('keydown', this.handleKeyDown);
                window.removeEventListener('keyup', this.handleKeyUp);
                cancelAnimationFrame(this.reqId);
                this.container.innerHTML = '';
            }
            
            // Mobil Buton Tetikleyicileri İçin
            simulateKey(key, isDown) {
                this.keys[key] = isDown;
            }
        }


        // --- OYUN 1: DEDEKTİF (3D ROBLOX MYSTERY VERSİYONU) ---
        const Game1Mystery = ({ onBack }) => {
            const [mode, setMode] = useState('customize'); // customize, selectMap, explore
            const [charIndex, setCharIndex] = useState(0); // 0 to 99
            const [activeMapId, setActiveMapId] = useState('orman');
            const [lives, setLives] = useState(3);
            const [solvedCount, setSolvedCount] = useState(0);
            
            // Soru State'leri
            const [activeQuestion, setActiveQuestion] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            const containerRef = React.useRef(null);
            const engineRef = React.useRef(null);

            const MAP_THEMES = {
                orman: { name: "Karanlık Orman", icon: "🌲" },
                market: { name: "Gece Marketi", icon: "🛒" },
                lahmacun: { name: "Meşhur Lahmacuncu", icon: "🍕" },
                podyum: { name: "Moda Podyumu", icon: "✨" },
                muze: { name: "Tarih Müzesi", icon: "🏛️" }
            };

            const questions = [
                { story: "1. İpucu: Şüpheli evden 'Dokuzu çeyrek geçe' çıkmış. Hangi saat doğru?", correctIdx: 0, options: [{ h: 9, m: 15 }, { h: 8, m: 45 }, { h: 3, m: 45 }] },
                { story: "2. İpucu: Arabaya 'Öğleden sonra iki buçukta' binmiş.", correctIdx: 1, options: [{ h: 12, m: 30 }, { h: 14, m: 30 }, { h: 2, m: 0 }] },
                { story: "3. İpucu: Kamera onu 'Akşam sekize yirmi kala' kaydetmiş.", correctIdx: 2, options: [{ h: 8, m: 20 }, { h: 20, m: 40 }, { h: 19, m: 40 }] },
                { story: "4. İpucu: Tanığa göre 'Gece yarısı on ikiyi on geçe' oradaydı.", correctIdx: 1, options: [{ h: 12, m: 10 }, { h: 0, m: 10 }, { h: 10, m: 12 }] },
                { story: "5. İpucu: İstansyona 'Sabah on bire çeyrek kala' varmış.", correctIdx: 0, options: [{ h: 10, m: 45 }, { h: 11, m: 15 }, { h: 9, m: 45 }] },
                { story: "6. İpucu: Biletini 'Öğleden sonra dörtü yirmi geçe' almış.", correctIdx: 2, options: [{ h: 4, m: 20 }, { h: 14, m: 20 }, { h: 16, m: 20 }] },
                { story: "7. İpucu: Trenden 'Akşam yediyi beş geçe' inmiş.", correctIdx: 0, options: [{ h: 19, m: 5 }, { h: 7, m: 50 }, { h: 17, m: 5 }] },
                { story: "8. İpucu: Kapıdan 'Akşam dokuz buçukta' yürümüş.", correctIdx: 1, options: [{ h: 9, m: 30 }, { h: 21, m: 30 }, { h: 20, m: 30 }] },
                { story: "9. İpucu: Saklandığı yere 'Gece ona yirmi kala' girmiş.", correctIdx: 0, options: [{ h: 21, m: 40 }, { h: 10, m: 40 }, { h: 22, m: 20 }] },
                { story: "10. İpucu: Son şans! Katil tam 'Gece on birde' uykuya dalmış!", correctIdx: 2, options: [{ h: 11, m: 0 }, { h: 22, m: 0 }, { h: 23, m: 0 }] }
            ];

            const startGame = (mapId) => {
                setActiveMapId(mapId);
                setMode('explore');
                setLives(3);
                setSolvedCount(0);
            };

            // 3D Motoru Başlatma
            useEffect(() => {
                if (mode === 'explore' && containerRef.current && !engineRef.current) {
                    engineRef.current = new DetectiveGame3D(containerRef.current, activeMapId, charIndex, (clueId) => {
                        engineRef.current.setPaused(true);
                        setActiveQuestion(clueId);
                    });
                }
                return () => {
                    if (mode !== 'explore' && engineRef.current) {
                        engineRef.current.cleanup();
                        engineRef.current = null;
                    }
                };
            }, [mode, activeMapId, charIndex]);

            // Soru Çözme Mantığı
            const handleGuess = (idx) => {
                const q = questions[activeQuestion];
                setIsCorrect(idx === q.correctIdx);
                setShowFeedback(true);
            };

            const nextStep = () => {
                setShowFeedback(false);
                
                if (isCorrect) {
                    engineRef.current.markSolved(activeQuestion);
                    const newCount = solvedCount + 1;
                    setSolvedCount(newCount);
                    if (newCount >= 10) setMode('won');
                    else engineRef.current.setPaused(false);
                } else {
                    const newLives = lives - 1;
                    setLives(newLives);
                    if (newLives <= 0) {
                        setMode('lost');
                    } else {
                        engineRef.current.resetPlayer(); // Başa at
                        engineRef.current.setPaused(false);
                    }
                }
                setActiveQuestion(null);
            };

            // Mobil Kontrol Fonksiyonları
            const handleBtn = (key, isDown) => {
                if(engineRef.current) engineRef.current.simulateKey(key, isDown);
            };

            // --- EKRAN 1: KARAKTER SEÇİMİ ---
            if (mode === 'customize') {
                return (
                    <div className="max-w-4xl mx-auto">
                        <GameHeader title="3D Dedektifini Seç" onBack={onBack} icon={Search} />
                        <div className="bg-white p-8 rounded-2xl shadow-lg border-t-8 border-indigo-500 flex flex-col items-center justify-center">
                            <h3 className="text-xl font-bold text-slate-700 mb-6">100 Farklı Kız Karakterden Birini Seç!</h3>
                            
                            <div className="flex items-center gap-8 mb-8">
                                <button onClick={() => setCharIndex(p => (p - 1 + 100) % 100)} className="w-16 h-16 rounded-full bg-slate-200 hover:bg-indigo-500 hover:text-white flex items-center justify-center font-black text-2xl shadow-md transition-all active:scale-95"> &lt; </button>
                                
                                <div className="bg-gradient-to-br from-indigo-50 to-purple-100 p-2 rounded-3xl shadow-inner border-4 border-indigo-200 relative overflow-hidden">
                                    <CharacterPreview3D charIndex={charIndex} />
                                    <span className="absolute bottom-4 bg-black/70 text-white px-4 py-1 rounded-full font-mono text-sm font-bold left-1/2 -translate-x-1/2">Karakter #{charIndex + 1}</span>
                                </div>

                                <button onClick={() => setCharIndex(p => (p + 1) % 100)} className="w-16 h-16 rounded-full bg-slate-200 hover:bg-indigo-500 hover:text-white flex items-center justify-center font-black text-2xl shadow-md transition-all active:scale-95"> &gt; </button>
                            </div>

                            <button onClick={() => setMode('selectMap')} className="bg-green-500 hover:bg-green-400 text-white font-black py-4 px-12 rounded-2xl shadow-lg border-b-4 border-green-700 active:border-b-0 active:translate-y-1 transition-all text-2xl flex items-center gap-3">
                                Harita Seç <ArrowLeft className="rotate-180" size={24}/>
                            </button>
                        </div>
                    </div>
                );
            }

            // --- EKRAN 2: HARİTA SEÇİMİ ---
            if (mode === 'selectMap') {
                return (
                    <div className="max-w-5xl mx-auto">
                        <GameHeader title="Olay Yerini Seç (3D Haritalar)" onBack={() => setMode('customize')} icon={Search} />
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                            {Object.entries(MAP_THEMES).map(([id, theme]) => (
                                <button key={id} onClick={() => startGame(id)} className="bg-slate-800 p-6 rounded-3xl shadow-xl hover:scale-105 transition-transform border-4 border-slate-600 flex flex-col items-center gap-4 group">
                                    <div className="text-6xl filter drop-shadow-md z-10">{theme.icon}</div>
                                    <h3 className="text-2xl font-black text-white drop-shadow-md z-10">{theme.name}</h3>
                                    <div className="mt-2 bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold z-10 group-hover:bg-indigo-400 transition-colors">3D Dünyaya Gir</div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            // --- EKRAN 3 & 4: KAZANMA VE KAYBETME ---
            if (mode === 'won' || mode === 'lost') {
                return (
                    <div className="max-w-4xl mx-auto text-center">
                        <GameHeader title="Oyun Bitti" onBack={onBack} icon={Search} />
                        <div className={`p-12 rounded-3xl shadow-2xl ${mode === 'won' ? 'bg-green-100 border-4 border-green-500' : 'bg-red-100 border-4 border-red-500'}`}>
                            {mode === 'won' ? <Trophy size={100} className="mx-auto text-yellow-500 mb-6" /> : <Ghost size={100} className="mx-auto text-slate-700 mb-6" />}
                            <h2 className={`text-4xl font-black mb-4 ${mode === 'won' ? 'text-green-700' : 'text-red-700'}`}>
                                {mode === 'won' ? "Mükemmel! Suçluyu Yakaladın!" : "Eyvah, Katil Kaçtı!"}
                            </h2>
                            <p className="text-xl text-slate-700 font-medium mb-8">
                                {mode === 'won' ? `Tüm ipuçlarını çözdün ve ${MAP_THEMES[activeMapId].name} güvende!` : "Zaman kaybettin ve izini kaybettirdi."}
                            </p>
                            <button onClick={onBack} className="bg-slate-800 text-white px-8 py-4 rounded-xl font-bold text-xl hover:scale-105 transition-transform">
                                Ana Menüye Dön
                            </button>
                        </div>
                    </div>
                );
            }

            // --- EKRAN 5: 3D OYNANIŞ (EXPLORE) ---
            return (
                <div className="max-w-5xl mx-auto select-none relative">
                    <GameHeader title={`${MAP_THEMES[activeMapId].name} - 3D Roleplay`} onBack={onBack} icon={Search} />
                    
                    {/* Üst Bilgi Barı */}
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-4 border-b-4 border-indigo-300 relative z-10">
                        <div className="flex gap-2">
                            {[...Array(3)].map((_, i) => (
                                <Heart key={i} size={28} className={i < lives ? "text-red-500" : "text-slate-200"} style={i < lives ? { fill: '#ef4444'} : {}} />
                            ))}
                        </div>
                        <div className="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2">
                            <Search size={18} className="text-yellow-400" /> Çözülen İpuçları: {solvedCount} / 10
                        </div>
                    </div>

                    {/* 3D Kapsayıcı */}
                    <div className="w-full h-[600px] bg-black rounded-3xl shadow-2xl border-8 border-slate-800 relative overflow-hidden">
                        <div ref={containerRef} className="w-full h-full absolute inset-0"></div>

                        {/* Soru Çözme Arayüzü (Overlay) */}
                        {activeQuestion !== null && (
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-20 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl p-8 max-w-2xl w-full shadow-2xl border-t-8 border-indigo-500 animate-in fade-in zoom-in">
                                    <div className="bg-indigo-50 p-6 rounded-2xl border-l-8 border-yellow-400 mb-8">
                                        <p className="text-2xl font-bold text-slate-800">{questions[activeQuestion].story}</p>
                                    </div>
                                    <div className="flex flex-wrap justify-center gap-6">
                                        {questions[activeQuestion].options.map((opt, i) => (
                                            <button key={i} onClick={() => handleGuess(i)} className="bg-slate-50 text-slate-900 p-6 rounded-3xl flex flex-col items-center gap-4 hover:bg-yellow-100 hover:scale-105 transition-all shadow-md border-b-4 border-slate-300 active:border-b-0 active:translate-y-1">
                                                <AnalogClock hour={opt.h} minute={opt.m} size={120} />
                                                <span className="font-black text-xl bg-slate-800 text-white px-6 py-2 rounded-full">{String(opt.h).padStart(2,'0')}:{String(opt.m).padStart(2,'0')}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Geri Bildirim Modal (Soru üstüne biner) */}
                        {showFeedback && (
                            <div className="absolute inset-0 z-30">
                                <FeedbackModal isSuccess={isCorrect} message={isCorrect ? "Doğru saat! Katilin peşindesin." : "Yanlış! Başa döndün ve zaman kaybettin."} onNext={nextStep} />
                            </div>
                        )}

                        {/* Mobil / Ekranda Kontroller */}
                        <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 z-10 lg:hidden">
                            <button 
                                onTouchStart={()=>handleBtn('w', true)} onTouchEnd={()=>handleBtn('w', false)}
                                onMouseDown={()=>handleBtn('w', true)} onMouseUp={()=>handleBtn('w', false)}
                                className="bg-white/80 backdrop-blur text-slate-900 p-4 w-16 h-16 rounded-2xl shadow-lg font-black active:bg-slate-300"><i className="fas fa-arrow-up text-2xl"></i></button>
                            <div className="flex gap-2">
                                <button 
                                    onTouchStart={()=>handleBtn('a', true)} onTouchEnd={()=>handleBtn('a', false)}
                                    onMouseDown={()=>handleBtn('a', true)} onMouseUp={()=>handleBtn('a', false)}
                                    className="bg-white/80 backdrop-blur text-slate-900 p-4 w-16 h-16 rounded-2xl shadow-lg font-black active:bg-slate-300"><i className="fas fa-arrow-left text-2xl"></i></button>
                                <button 
                                    onTouchStart={()=>handleBtn('s', true)} onTouchEnd={()=>handleBtn('s', false)}
                                    onMouseDown={()=>handleBtn('s', true)} onMouseUp={()=>handleBtn('s', false)}
                                    className="bg-white/80 backdrop-blur text-slate-900 p-4 w-16 h-16 rounded-2xl shadow-lg font-black active:bg-slate-300"><i className="fas fa-arrow-down text-2xl"></i></button>
                                <button 
                                    onTouchStart={()=>handleBtn('d', true)} onTouchEnd={()=>handleBtn('d', false)}
                                    onMouseDown={()=>handleBtn('d', true)} onMouseUp={()=>handleBtn('d', false)}
                                    className="bg-white/80 backdrop-blur text-slate-900 p-4 w-16 h-16 rounded-2xl shadow-lg font-black active:bg-slate-300"><i className="fas fa-arrow-right text-2xl"></i></button>
                            </div>
                        </div>
                        <p className="absolute bottom-4 left-4 text-white/70 font-mono text-sm drop-shadow-md z-10 font-bold bg-black/40 py-2 px-4 rounded-full hidden lg:block">W, A, S, D ile karakteri hareket ettir. Altın ipuçlarına yaklaş.</p>
                    </div>
                </div>
            );
        };

        // --- OYUN 2: ADAM ASMACA ---
        const Game2Hangman = ({ onBack }) => {
            const [level, setLevel] = useState(0);
            const [guessed, setGuessed] = useState(new Set());
            const [mistakes, setMistakes] = useState(0);
            const [status, setStatus] = useState('playing');

            const questions = [
                { h: 7, m: 15, word: "YEDİYİ ÇEYREK GEÇİYOR" },
                { h: 2, m: 30, word: "İKİ BUÇUK" },
                { h: 11, m: 45, word: "ON İKİYE ÇEYREK VAR" },
                { h: 5, m: 20, word: "BEŞİ YİRMİ GEÇİYOR" }
            ];

            const alphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split('');
            const q = questions[level];

            const handleGuess = (letter) => {
                if (status !== 'playing' || guessed.has(letter)) return;
                const newGuessed = new Set(guessed).add(letter);
                setGuessed(newGuessed);

                if (!q.word.includes(letter)) {
                const newMistakes = mistakes + 1;
                setMistakes(newMistakes);
                if (newMistakes >= 6) setStatus('lost');
                } else {
                const isWon = q.word.split('').every(char => char === ' ' || newGuessed.has(char));
                if (isWon) setStatus('won');
                }
            };

            const nextLevel = () => {
                if (status === 'won' && level + 1 < questions.length) {
                setLevel(l => l + 1);
                setGuessed(new Set());
                setMistakes(0);
                setStatus('playing');
                } else {
                onBack();
                }
            };

            const renderHangman = () => {
                const parts = [
                <line key="base" x1="10" y1="90" x2="90" y2="90" stroke="black" strokeWidth="4" />,
                <line key="pole" x1="30" y1="90" x2="30" y2="10" stroke="black" strokeWidth="4" />,
                <line key="top" x1="30" y1="10" x2="70" y2="10" stroke="black" strokeWidth="4" />,
                <line key="rope" x1="70" y1="10" x2="70" y2="30" stroke="black" strokeWidth="4" />,
                mistakes >= 1 && <circle key="head" cx="70" cy="40" r="10" stroke="black" strokeWidth="4" fill="none" />,
                mistakes >= 2 && <line key="body" x1="70" y1="50" x2="70" y2="70" stroke="black" strokeWidth="4" />,
                mistakes >= 3 && <line key="armL" x1="70" y1="55" x2="55" y2="65" stroke="black" strokeWidth="4" />,
                mistakes >= 4 && <line key="armR" x1="70" y1="55" x2="85" y2="65" stroke="black" strokeWidth="4" />,
                mistakes >= 5 && <line key="legL" x1="70" y1="70" x2="60" y2="85" stroke="black" strokeWidth="4" />,
                mistakes >= 6 && <line key="legR" x1="70" y1="70" x2="80" y2="85" stroke="black" strokeWidth="4" />
                ];
                return <svg width="120" height="120" viewBox="0 0 100 100" className="mx-auto bg-amber-50 rounded-lg shadow-inner">{parts}</svg>;
            };

            return (
                <div className="max-w-4xl mx-auto">
                <GameHeader title="Adam Asmaca: Saati Oku" onBack={onBack} icon={UserMinus} />
                <div className="bg-white p-6 rounded-2xl shadow-md grid md:grid-cols-2 gap-8 items-center border-t-4 border-amber-400">
                    <div className="flex flex-col items-center gap-6 bg-slate-50 p-6 rounded-xl">
                    <AnalogClock hour={q.h} minute={q.m} size={150} />
                    {renderHangman()}
                    <div className="text-red-500 font-bold">Kalan Hak: {6 - mistakes}</div>
                    </div>
                    <div className="flex flex-col gap-6">
                    <div className="flex flex-wrap justify-center gap-2">
                        {q.word.split('').map((char, i) => (
                        <span key={i} className={`w-8 h-10 flex items-center justify-center text-2xl font-bold border-b-4 ${char === ' ' ? 'border-transparent' : 'border-slate-800'} ${guessed.has(char) || status === 'lost' ? 'text-slate-800' : 'text-transparent'}`}>
                            {char}
                        </span>
                        ))}
                    </div>
                    <div className="flex flex-wrap justify-center gap-2 mt-4">
                        {alphabet.map(letter => (
                        <button key={letter} onClick={() => handleGuess(letter)} disabled={guessed.has(letter) || status !== 'playing'} className={`w-10 h-10 font-bold rounded shadow ${guessed.has(letter) ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-amber-100 text-amber-900 hover:bg-amber-200 active:scale-95 border-b-2 border-amber-300'}`}>
                            {letter}
                        </button>
                        ))}
                    </div>
                    </div>
                </div>
                {status !== 'playing' && <FeedbackModal isSuccess={status === 'won'} message={status === 'won' ? "Harika, doğru okudun!" : `Bilemedin! Doğru cevap: ${q.word}`} onNext={status === 'won' ? nextLevel : () => { setGuessed(new Set()); setMistakes(0); setStatus('playing'); }} isGameOver={status === 'won' && level === questions.length - 1} />}
                </div>
            );
        };

        // --- OYUN 3: EŞLEŞTİRME ---
        const Game3MatchMaker = ({ onBack }) => {
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [matched, setMatched] = useState([]);
            const [timeLeft, setTimeLeft] = useState(60);
            const [status, setStatus] = useState('playing');

            const pairs = [
                { id: 1, h: 1, m: 0 }, { id: 2, h: 13, m: 30 }, { id: 3, h: 18, m: 45 },
                { id: 4, h: 22, m: 15 }, { id: 5, h: 8, m: 25 }, { id: 6, h: 14, m: 50 }
            ];

            useEffect(() => {
                let deck = [];
                pairs.forEach(p => {
                deck.push({ ...p, uniqueId: `a-${p.id}`, type: 'analog' });
                deck.push({ ...p, uniqueId: `d-${p.id}`, type: 'digital' });
                });
                deck = deck.sort(() => Math.random() - 0.5);
                setCards(deck);
            }, []);

            useEffect(() => {
                if (status !== 'playing') return;
                if (timeLeft <= 0) setStatus('lost');
                const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, status]);

            const handleCardClick = (index) => {
                if (status !== 'playing' || flipped.length >= 2 || flipped.includes(index) || matched.includes(index)) return;
                
                const newFlipped = [...flipped, index];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                const card1 = cards[newFlipped[0]];
                const card2 = cards[newFlipped[1]];
                if (card1.id === card2.id) {
                    const newMatched = [...matched, newFlipped[0], newFlipped[1]];
                    setMatched(newMatched);
                    setFlipped([]);
                    if (newMatched.length === cards.length) setStatus('won');
                } else {
                    setTimeout(() => setFlipped([]), 1000);
                }
                }
            };

            return (
                <div className="max-w-4xl mx-auto">
                <GameHeader title="Zamanı Eşleştir" onBack={onBack} icon={RotateCcw} />
                <div className="bg-white p-6 rounded-2xl shadow-md border-t-4 border-emerald-400">
                    <div className="flex justify-between items-center mb-6">
                    <div className="text-xl font-bold text-slate-700">Eşleşenler: {matched.length / 2} / {pairs.length}</div>
                    <div className={`text-2xl font-black ${timeLeft < 15 ? 'text-red-500 animate-pulse' : 'text-emerald-600'}`}>
                        Süre: {timeLeft}s
                    </div>
                    </div>
                    <div className="grid grid-cols-3 md:grid-cols-4 gap-4">
                    {cards.map((card, i) => {
                        const isFlipped = flipped.includes(i) || matched.includes(i);
                        return (
                        <button key={card.uniqueId} onClick={() => handleCardClick(i)} className={`aspect-square rounded-xl flex items-center justify-center text-xl font-bold transition-all duration-300 transform ${isFlipped ? 'bg-indigo-50 shadow-inner scale-100' : 'bg-indigo-500 shadow-lg hover:bg-indigo-400 scale-105 hover:scale-110 border-b-4 border-indigo-700'} ${matched.includes(i) ? 'opacity-50' : ''}`}>
                            {isFlipped ? (
                            card.type === 'analog' ? <AnalogClock hour={card.h} minute={card.m} size={80} /> : <span className="text-3xl text-indigo-900">{String(card.h).padStart(2,'0')}:{String(card.m).padStart(2,'0')}</span>
                            ) : (
                            <Clock className="text-white/50" size={40} />
                            )}
                        </button>
                        );
                    })}
                    </div>
                </div>
                {status !== 'playing' && <FeedbackModal isSuccess={status === 'won'} message={status === 'won' ? "Hepsini eşleştirdin, süper hafıza!" : "Süre doldu, daha hızlı olmalısın!"} onNext={status === 'won' ? onBack : () => { setStatus('playing'); setTimeLeft(60); setMatched([]); setFlipped([]); setCards([...cards].sort(() => Math.random() - 0.5)); }} isGameOver={status === 'won'} />}
                </div>
            );
        };

        // --- OYUN 4: UZAY YARIŞI ---
        const Game4SpaceRace = ({ onBack }) => {
            const [level, setLevel] = useState(0);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            const questions = [
                { h: 4, m: 40, options: ["03:40", "04:40", "08:15"], correctIdx: 1 },
                { h: 15, m: 5, options: ["15:05", "03:25", "17:15"], correctIdx: 0 },
                { h: 20, m: 55, options: ["20:55", "11:40", "08:55"], correctIdx: 0 },
                { h: 12, m: 10, options: ["00:50", "12:10", "10:12"], correctIdx: 1 },
                { h: 17, m: 35, options: ["05:07", "07:25", "17:35"], correctIdx: 2 }
            ];

            const handleGuess = (idx) => {
                setIsCorrect(idx === questions[level].correctIdx);
                setShowFeedback(true);
            };

            const nextLevel = () => {
                setShowFeedback(false);
                if (isCorrect) {
                if (level + 1 < questions.length) setLevel(l => l + 1);
                else onBack();
                }
            };

            const q = questions[level];
            const progress = (level / questions.length) * 100;

            return (
                <div className="max-w-4xl mx-auto">
                <GameHeader title="Uzay Yarışı" onBack={onBack} icon={Rocket} />
                <div className="bg-slate-900 p-8 rounded-2xl text-white shadow-xl border-t-4 border-purple-500 relative overflow-hidden">
                    <div className="absolute inset-0 opacity-30 bg-[radial-gradient(circle_at_center,_white_1px,_transparent_1px)] bg-[length:20px_20px]"></div>
                    <div className="relative z-10 flex flex-col items-center">
                    <div className="w-full h-16 bg-slate-800 rounded-full mb-12 relative flex items-center px-4">
                        <div className="absolute left-0 top-0 bottom-0 bg-purple-600/30 rounded-full transition-all duration-1000" style={{width: `${progress}%`}}></div>
                        <Rocket className="text-purple-400 absolute transition-all duration-1000" size={32} style={{left: `calc(${progress}% - 16px)`}} />
                        <div className="absolute right-4"><Star className="text-yellow-400" size={32} /></div>
                    </div>
                    <h3 className="text-2xl font-bold text-purple-200 mb-6">Roketi ilerletmek için doğru saati seç!</h3>
                    <div className="bg-slate-800 p-4 rounded-full border-4 border-purple-400 shadow-[0_0_30px_rgba(168,85,247,0.4)] mb-8">
                        <AnalogClock hour={q.h} minute={q.m} size={160} />
                    </div>
                    <div className="flex gap-4">
                        {q.options.map((opt, i) => (
                        <button key={i} onClick={() => handleGuess(i)} className="bg-purple-600 hover:bg-purple-500 text-white text-2xl font-bold py-4 px-8 rounded-xl border-b-4 border-purple-800 active:border-b-0 active:translate-y-1 transition-all">
                            {opt}
                        </button>
                        ))}
                    </div>
                    </div>
                </div>
                {showFeedback && <FeedbackModal isSuccess={isCorrect} message={isCorrect ? "Roket hızlanıyor!" : "Yanlış rota! Çabuk düzelt."} onNext={nextLevel} isGameOver={isCorrect && level === questions.length - 1} />}
                </div>
            );
        };

        // --- OYUN 5: BOMBA İMHA ---
        const Game5Defuse = ({ onBack }) => {
            const [level, setLevel] = useState(0);
            const [timeLeft, setTimeLeft] = useState(15);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            const questions = [
                { h: 6, m: 50, wires: ["18:50", "05:50", "02:50"], correctIdx: 0 },
                { h: 10, m: 25, wires: ["10:25", "05:50", "02:25"], correctIdx: 0 },
                { h: 1, m: 55, wires: ["01:55", "11:05", "13:05"], correctIdx: 0 },
                { h: 16, m: 40, wires: ["16:40", "08:20", "04:08"], correctIdx: 0 }
            ];

            const [shuffledWires, setShuffledWires] = useState([]);
            const [correctWireStr, setCorrectWireStr] = useState("");

            useEffect(() => {
                const q = questions[level];
                const correctVal = q.wires[q.correctIdx];
                setCorrectWireStr(correctVal);
                setShuffledWires([...q.wires].sort(() => Math.random() - 0.5));
                setTimeLeft(15 - level * 2); 
            }, [level]);

            useEffect(() => {
                if (showFeedback) return;
                if (timeLeft <= 0) {
                setIsCorrect(false);
                setShowFeedback(true);
                return;
                }
                const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, showFeedback]);

            const handleCut = (wire) => {
                const correct = wire === correctWireStr;
                setIsCorrect(correct);
                setShowFeedback(true);
            };

            const nextLevel = () => {
                setShowFeedback(false);
                if (isCorrect) {
                if (level + 1 < questions.length) setLevel(l => l + 1);
                else onBack();
                } else {
                setTimeLeft(15 - level * 2);
                }
            };

            const q = questions[level];
            const wireColors = ['bg-red-500', 'bg-blue-500', 'bg-green-500'];

            return (
                <div className="max-w-4xl mx-auto">
                <GameHeader title="Bombayı İmha Et" onBack={onBack} icon={Bomb} />
                <div className="bg-neutral-800 p-8 rounded-2xl shadow-2xl border-t-8 border-neutral-900 relative">
                    <div className="absolute top-4 right-4 flex items-center gap-2 bg-black px-4 py-2 rounded-lg border-2 border-neutral-700">
                    <Clock className="text-red-500" />
                    <span className={`font-mono text-3xl font-bold ${timeLeft < 6 ? 'text-red-500 animate-pulse' : 'text-red-400'}`}>00:{String(timeLeft).padStart(2,'0')}</span>
                    </div>
                    
                    <div className="flex flex-col md:flex-row items-center justify-center gap-12 mt-8">
                    <div className="bg-neutral-300 p-6 rounded-full border-8 border-neutral-600 shadow-inner">
                        <AnalogClock hour={q.h} minute={q.m} size={150} />
                    </div>
                    
                    <div className="flex flex-col gap-4 w-full max-w-xs">
                        <h3 className="text-center text-white font-bold mb-2 uppercase tracking-widest text-sm text-neutral-400">Kabloları Kes</h3>
                        {shuffledWires.map((wire, i) => (
                        <button key={i} onClick={() => handleCut(wire)} className={`relative h-16 w-full ${wireColors[i]} rounded-lg shadow-lg hover:brightness-110 active:scale-95 transition-all overflow-hidden group flex items-center justify-center`}>
                            <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors"></div>
                            <div className="absolute left-0 right-0 h-1 bg-black/30 top-1/2 -translate-y-1/2"></div>
                            <span className="relative z-10 bg-white/90 text-neutral-900 font-bold px-4 py-1 rounded shadow-sm text-xl border-2 border-neutral-800">{wire}</span>
                        </button>
                        ))}
                    </div>
                    </div>
                </div>
                {showFeedback && <FeedbackModal isSuccess={isCorrect} message={isCorrect ? "Kabloyu doğru kestin! Derin bir oh çek." : "BOOM! Yanlış kablo veya süre bitti!"} onNext={nextLevel} isGameOver={isCorrect && level === questions.length - 1} />}
                </div>
            );
        };

        // --- OYUN 6: KOVALAMACA ---
        const Game6Chase = ({ onBack }) => {
            const [level, setLevel] = useState(0);
            const [dangerLevel, setDangerLevel] = useState(0);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            const questions = [
                { h: 9, m: 5, options: ["09:05", "05:45", "01:45", "12:25"], correctIdx: 0 },
                { h: 13, m: 15, options: ["13:45", "03:15", "15:15", "13:15"], correctIdx: 3 },
                { h: 23, m: 20, options: ["11:20", "23:20", "04:55", "08:55"], correctIdx: 1 },
                { h: 7, m: 55, options: ["06:55", "08:05", "07:55", "19:05"], correctIdx: 2 }
            ];

            const [shuffledOptions, setShuffledOptions] = useState([]);
            const [correctOpt, setCorrectOpt] = useState("");

            useEffect(() => {
                const q = questions[level];
                setCorrectOpt(q.options[q.correctIdx]);
                setShuffledOptions([...q.options].sort(() => Math.random() - 0.5));
                setDangerLevel(0);
            }, [level]);

            useEffect(() => {
                if (showFeedback) return;
                if (dangerLevel >= 100) {
                setIsCorrect(false);
                setShowFeedback(true);
                return;
                }
                const interval = setInterval(() => {
                setDangerLevel(d => Math.min(d + (1.5 + level * 0.5), 100));
                }, 100);
                return () => clearInterval(interval);
            }, [dangerLevel, showFeedback, level]);

            const handleEscape = (opt) => {
                const correct = opt === correctOpt;
                setIsCorrect(correct);
                setShowFeedback(true);
            };

            const nextLevel = () => {
                setShowFeedback(false);
                if (isCorrect) {
                if (level + 1 < questions.length) setLevel(l => l + 1);
                else onBack();
                } else {
                setDangerLevel(0);
                }
            };

            const q = questions[level];
            const isDangerHigh = dangerLevel > 75;

            return (
                <div className="max-w-4xl mx-auto">
                <GameHeader title="Canavardan Kaçış!" onBack={onBack} icon={Ghost} />
                <div className={`bg-stone-900 p-6 rounded-2xl shadow-xl border-4 transition-colors duration-300 ${isDangerHigh ? 'border-red-600 bg-red-950' : 'border-stone-700'}`}>
                    <div className="w-full h-8 bg-black rounded-full mb-8 border-2 border-stone-600 p-1 relative overflow-hidden">
                    <div className="h-full bg-red-600 rounded-full transition-all duration-100 ease-linear flex items-center justify-end pr-2" style={{width: `${dangerLevel}%`}}>
                        <Ghost className="text-white drop-shadow-md" size={20} />
                    </div>
                    <span className="absolute inset-0 flex items-center justify-center text-white/50 text-xs font-bold uppercase tracking-widest z-10">Canavar Yaklaşıyor</span>
                    </div>

                    <div className="flex flex-col items-center">
                    <div className="bg-stone-200 p-4 rounded-full border-4 border-stone-400 mb-8 animate-bounce-slow">
                        <AnalogClock hour={q.h} minute={q.m} size={140} />
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4 w-full max-w-md">
                        {shuffledOptions.map((opt, i) => (
                        <button key={i} onClick={() => handleEscape(opt)} className="bg-stone-700 hover:bg-stone-600 text-green-400 font-mono text-3xl font-bold py-6 rounded-xl border-b-4 border-stone-900 active:border-b-0 active:translate-y-1 transition-all shadow-lg flex justify-center items-center gap-2">
                            {opt}
                        </button>
                        ))}
                    </div>
                    </div>
                </div>
                {showFeedback && <FeedbackModal isSuccess={isCorrect} message={isCorrect ? "Kıl payı kurtuldun, koşmaya devam!" : "Canavar seni yakaladı! Tekrar dene."} onNext={nextLevel} isGameOver={isCorrect && level === questions.length - 1} />}
                </div>
            );
        };

        // --- OYUN 7: KÖSTEBEK ---
        const Game7Whack = ({ onBack }) => {
            const [level, setLevel] = useState(0);
            const [activeHole, setActiveHole] = useState(-1);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);
            
            const questions = [
                { targetStr: "Saat 14:00", options: [{h:14,m:0}, {h:4,m:0}, {h:12,m:0}], correctIdx: 0 },
                { targetStr: "Saat 08:35", options: [{h:7,m:40}, {h:8,m:35}, {h:5,m:40}], correctIdx: 1 },
                { targetStr: "Saat 21:50", options: [{h:9,m:50}, {h:10,m:50}, {h:21,m:50}], correctIdx: 2 },
                { targetStr: "Saat 00:15", options: [{h:0,m:15}, {h:12,m:15}, {h:3,m:0}], correctIdx: 0 }
            ];

            const q = questions[level];

            useEffect(() => {
                if (showFeedback) {
                setActiveHole(-1);
                return;
                }
                const interval = setInterval(() => {
                setActiveHole(Math.floor(Math.random() * q.options.length));
                }, 1200); 
                return () => clearInterval(interval);
            }, [level, showFeedback, q.options.length]);

            const handleWhack = (idx) => {
                if (idx !== activeHole) return; 
                const correct = idx === q.correctIdx;
                setIsCorrect(correct);
                setShowFeedback(true);
            };

            const nextLevel = () => {
                setShowFeedback(false);
                if (isCorrect) {
                if (level + 1 < questions.length) setLevel(l => l + 1);
                else onBack();
                }
            };

            return (
                <div className="max-w-4xl mx-auto">
                <GameHeader title="Köstebek Vurmaca" onBack={onBack} icon={Hammer} />
                <div className="bg-green-600 p-8 rounded-2xl shadow-xl border-t-8 border-green-700">
                    <div className="bg-white/90 p-4 rounded-xl text-center mb-8 shadow-md">
                    <h3 className="text-xl text-green-800 font-bold mb-1">Hedef Saat:</h3>
                    <p className="text-3xl font-black text-green-600">{q.targetStr}</p>
                    </div>

                    <div className="flex justify-center gap-6">
                    {q.options.map((opt, i) => (
                        <div key={i} className="relative w-32 h-40">
                        <div className="absolute bottom-0 w-full h-12 bg-green-900 rounded-[100%]"></div>
                        <div 
                            className={`absolute w-full flex justify-center transition-all duration-300 ease-out cursor-pointer ${activeHole === i ? 'bottom-8 opacity-100 scale-100' : '-bottom-4 opacity-0 scale-50 pointer-events-none'}`}
                            onClick={() => handleWhack(i)}
                        >
                            <div className="bg-amber-600 p-2 rounded-t-full rounded-b-xl border-4 border-amber-800 flex flex-col items-center hover:brightness-110 active:scale-90 transition-transform">
                            <div className="w-4 h-4 bg-amber-900 rounded-full mb-1"></div>
                            <AnalogClock hour={opt.h} minute={opt.m} size={80} className="border-amber-900" />
                            </div>
                        </div>
                        </div>
                    ))}
                    </div>
                </div>
                {showFeedback && <FeedbackModal isSuccess={isCorrect} message={isCorrect ? "Tam isabet! Doğru saati yakaladın." : "Yanlış saati vurdun! Hedefe dikkat et."} onNext={nextLevel} isGameOver={isCorrect && level === questions.length - 1} />}
                </div>
            );
        };

        // --- OYUN 8: HAZİNE AVI ---
        const Game8Treasure = ({ onBack }) => {
            const [level, setLevel] = useState(0);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            const questions = [
                { q: "Saat 10:30'da fırına koyduğum kek 45 dakika pişti. Saat kaçta fırından çıkardım?", options: [{h:11,m:15}, {h:10,m:45}, {h:11,m:30}], correctIdx: 0 },
                { q: "Film 2 saat 15 dakika sürdü. Bittiğinde saat 16:45'ti. Film kaçta başladı?", options: [{h:14,m:0}, {h:14,m:30}, {h:15,m:15}], correctIdx: 1 },
                { q: "Okul servisim 07:40'ta geliyor. 20 dakika yolculuk yapıyorum. Okula kaçta varırım?", options: [{h:8,m:20}, {h:7,m:20}, {h:8,m:0}], correctIdx: 2 }
            ];

            const handleOpenChest = (idx) => {
                setIsCorrect(idx === questions[level].correctIdx);
                setShowFeedback(true);
            };

            const nextLevel = () => {
                setShowFeedback(false);
                if (isCorrect) {
                if (level + 1 < questions.length) setLevel(l => l + 1);
                else onBack();
                }
            };

            const q = questions[level];

            return (
                <div className="max-w-4xl mx-auto">
                <GameHeader title="Hazine Avı: Zaman Problemleri" onBack={onBack} icon={Gem} />
                <div className="bg-yellow-100 p-8 rounded-2xl shadow-xl border-4 border-yellow-500 relative">
                    <div className="bg-white/80 p-6 rounded-xl shadow-sm border-2 border-yellow-300 mb-8 text-center">
                    <h3 className="text-xl font-bold text-yellow-900 mb-2">Gizli Harita {level + 1}</h3>
                    <p className="text-lg text-yellow-800 font-medium">{q.q}</p>
                    </div>

                    <div className="flex justify-center gap-8 flex-wrap">
                    {q.options.map((opt, i) => (
                        <button key={i} onClick={() => handleOpenChest(i)} className="flex flex-col items-center gap-4 group">
                        <div className="w-32 h-24 bg-amber-700 rounded-lg relative border-b-8 border-amber-900 shadow-lg group-hover:-translate-y-2 transition-transform flex items-center justify-center">
                            <div className="absolute top-0 w-full h-10 bg-amber-600 rounded-t-lg border-b-2 border-amber-900 rounded-b-[50%]"></div>
                            <div className="absolute w-6 h-8 bg-yellow-400 border-2 border-yellow-600 rounded-sm z-10"></div>
                        </div>
                        <div className="bg-white px-4 py-2 rounded-full font-bold text-amber-900 shadow border-2 border-amber-200">
                            {String(opt.h).padStart(2,'0')}:{String(opt.m).padStart(2,'0')}
                        </div>
                        </button>
                    ))}
                    </div>
                </div>
                {showFeedback && <FeedbackModal isSuccess={isCorrect} message={isCorrect ? "Sandık açıldı! Altınlar senin!" : "Kilit açılmadı! Hesabını tekrar kontrol et."} onNext={nextLevel} isGameOver={isCorrect && level === questions.length - 1} />}
                </div>
            );
        };

        // --- OYUN 9: BİLGİ YARIŞMASI ---
        const Game9Quiz = ({ onBack }) => {
            const [level, setLevel] = useState(0);
            const [score, setScore] = useState(0);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            const questions = [
                { q: "Hangisi 'akşam yedi buçuk' demektir?", options: ["19:30", "07:30", "17:30", "09:30"], correctIdx: 0 },
                { q: "Analog saatte yelkovan (uzun ibre) 9'un üzerindeyse, saat kaç geçiyordur veya kaladır?", options: ["Çeyrek geçiyor", "Buçuk", "Çeyrek kala", "Tam saat"], correctIdx: 2 },
                { q: "Hangisi 'gece yarısı on ikiyi on geçiyor' demektir?", options: ["12:10", "00:10", "24:10", "22:10"], correctIdx: 1 },
                { q: "Akrep 4 ile 5 arasında, yelkovan 6'nın üzerindeyse saat kaçtır?", options: ["05:30", "04:30", "04:06", "05:06"], correctIdx: 1 },
                { q: "1 saat kaç dakikadır?", options: ["30", "100", "60", "24"], correctIdx: 2 }
            ];

            const handleAnswer = (idx) => {
                const correct = idx === questions[level].correctIdx;
                setIsCorrect(correct);
                if (correct) setScore(s => s + 10);
                setShowFeedback(true);
            };

            const nextLevel = () => {
                setShowFeedback(false);
                if (level + 1 < questions.length) setLevel(l => l + 1);
                else onBack();
            };

            const q = questions[level];

            return (
                <div className="max-w-4xl mx-auto">
                <GameHeader title="Büyük Zaman Sınavı" onBack={onBack} icon={HelpCircle} />
                <div className="bg-white p-8 rounded-2xl shadow-lg border-t-8 border-cyan-500">
                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                    <span className="text-slate-500 font-bold">Soru {level + 1}/{questions.length}</span>
                    <span className="bg-cyan-100 text-cyan-700 px-4 py-1 rounded-full font-bold flex items-center gap-2"><Trophy size={16}/> Puan: {score}</span>
                    </div>
                    
                    <h3 className="text-2xl font-bold text-slate-800 mb-8 text-center">{q.q}</h3>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {q.options.map((opt, i) => (
                        <button key={i} onClick={() => handleAnswer(i)} className="bg-slate-50 hover:bg-cyan-50 text-slate-700 hover:text-cyan-700 font-semibold text-xl py-4 px-6 rounded-xl border-2 border-slate-200 hover:border-cyan-400 transition-colors text-left flex items-center gap-4">
                        <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-sm">{['A','B','C','D'][i]}</div>
                        {opt}
                        </button>
                    ))}
                    </div>
                </div>
                {showFeedback && <FeedbackModal isSuccess={isCorrect} message={isCorrect ? "+10 Puan! Harika gidiyorsun." : `Yanlış cevap. Doğrusu: ${q.options[q.correctIdx]}`} onNext={nextLevel} isGameOver={level === questions.length - 1} />}
                </div>
            );
        };

        // --- ANA MENÜ ---
        const MainMenu = ({ onSelect }) => {
            const games = [
                { id: 1, title: "Dedektif", desc: "Doğru saati bul, hırsızı yakala!", icon: Search, color: "bg-blue-500" },
                { id: 2, title: "Adam Asmaca", desc: "Saatin okunuşunu tahmin et.", icon: UserMinus, color: "bg-amber-500" },
                { id: 3, title: "Eşleştirme", desc: "Analog ve dijital saatleri eşle.", icon: RotateCcw, color: "bg-emerald-500" },
                { id: 4, title: "Uzay Yarışı", desc: "Soruları bil, roketi uçur.", icon: Rocket, color: "bg-purple-500" },
                { id: 5, title: "Bomba İmha", desc: "Doğru kabloyu hızlıca kes!", icon: Bomb, color: "bg-red-500" },
                { id: 6, title: "Kovalamaca", desc: "Canavardan kaçmak için doğru saati seç.", icon: Ghost, color: "bg-stone-600" },
                { id: 7, title: "Köstebek", desc: "İstenen saati tutan köstebeği vur.", icon: Hammer, color: "bg-green-600" },
                { id: 8, title: "Hazine Avı", desc: "Zaman problemlerini çöz, sandığı aç.", icon: Gem, color: "bg-yellow-500" },
                { id: 9, title: "Bilgi Yarışması", desc: "Zamanla ilgili zorlu sorular.", icon: HelpCircle, color: "bg-cyan-500" },
            ];

            return (
                <div className="max-w-6xl mx-auto text-center py-8">
                <div className="mb-12">
                    <h1 className="text-4xl md:text-5xl font-black text-slate-800 mb-4 flex justify-center items-center gap-4">
                    <Clock className="text-indigo-600" size={48} /> Zaman Oyunları Merkezi
                    </h1>
                    <p className="text-xl text-slate-600 font-medium">3. Sınıf saatler konusunu oyunlarla öğren! İstediğin oyunu seç ve başla.</p>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 px-4">
                    {games.map(game => (
                    <button 
                        key={game.id} 
                        onClick={() => onSelect(game.id)}
                        className="group bg-white rounded-2xl p-6 shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-2 border border-slate-100 flex flex-col items-center text-center"
                    >
                        <div className={`w-20 h-20 rounded-full ${game.color} flex items-center justify-center text-white mb-4 shadow-inner group-hover:scale-110 transition-transform`}>
                        <game.icon size={40} />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">{game.title}</h2>
                        <p className="text-slate-500 mb-6">{game.desc}</p>
                        <div className="mt-auto px-6 py-2 bg-slate-100 group-hover:bg-indigo-50 group-hover:text-indigo-600 text-slate-600 rounded-full font-bold flex items-center gap-2 transition-colors">
                        <Play size={16} /> Oyna
                        </div>
                    </button>
                    ))}
                </div>
                </div>
            );
        };

        // --- ANA UYGULAMA (APP) ---
        function App() {
            const [activeGame, setActiveGame] = useState(0);

            return (
                <div className="min-h-screen font-sans p-4 md:p-8">
                {activeGame === 0 && <MainMenu onSelect={setActiveGame} />}
                {activeGame === 1 && <Game1Mystery onBack={() => setActiveGame(0)} />}
                {activeGame === 2 && <Game2Hangman onBack={() => setActiveGame(0)} />}
                {activeGame === 3 && <Game3MatchMaker onBack={() => setActiveGame(0)} />}
                {activeGame === 4 && <Game4SpaceRace onBack={() => setActiveGame(0)} />}
                {activeGame === 5 && <Game5Defuse onBack={() => setActiveGame(0)} />}
                {activeGame === 6 && <Game6Chase onBack={() => setActiveGame(0)} />}
                {activeGame === 7 && <Game7Whack onBack={() => setActiveGame(0)} />}
                {activeGame === 8 && <Game8Treasure onBack={() => setActiveGame(0)} />}
                {activeGame === 9 && <Game9Quiz onBack={() => setActiveGame(0)} />}
                </div>
            );
        }

        // Uygulamayı Render Et
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
